[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://datasourceinc.com/*"
  to = "https://www.datasourceinc.com/:splat"
  status = 301
  force = true

# Legacy .html URLs -> new routes (preserve ranking equity from the old site)

# ABIS product pages hold the existing rankings for "automated background
# investigation system" — point them at the new ABIS page.
[[redirects]]
  from = "/products/abis.html"
  to = "/why-abis"
  status = 301
  force = true

[[redirects]]
  from = "/products/products.html"
  to = "/why-abis"
  status = 301
  force = true

# Direct content matches
[[redirects]]
  from = "/about-us/privacy-policy.html"
